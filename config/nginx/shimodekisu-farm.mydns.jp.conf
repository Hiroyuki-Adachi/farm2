server {
    listen 80;
    server_name shimodekisu-farm.mydns.jp;

    # Let's Encrypt の認証用パスだけ許可（重要！！）
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;  # certbot用に使うドキュメントルート
    }

    # /personal_informations は HTTPS へリダイレクト
    location /personal_informations/ {
        return 301 https://shimodekisu-farm.mydns.jp$request_uri;
    }

    # 他のパスは遮断
    location / {
        return 444;
    }
}

# HTTPS（ポート443）：personal_informations だけ shimo-dekisu.farm に転送
server {
    listen 443 ssl;
    server_name shimodekisu-farm.mydns.jp;

    ssl_certificate /etc/letsencrypt/live/shimo-dekisu.farm/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shimo-dekisu.farm/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # /personal_informations/:uuid → 新ドメインへリダイレクト
    location ~ ^/personal_informations/(.+)$ {
        return 301 https://shimo-dekisu.farm/farm2/personal_informations/$1;
    }

    # その他は 404
    location / {
        return 404;
    }
}
