name: "farm2"

x-ssh-agent-env: &ssh_agent_env
  SSH_AUTH_SOCK: /ssh-agent

x-ssh-agent-volume: &ssh_agent_volume
  type: bind
  source: ${SSH_AUTH_SOCK:-./.dummy-ssh-agent}
  target: /ssh-agent
  read_only: true

services:
  db:
    image: groonga/pgroonga:latest-debian-16
    volumes:
      - type: volume
        source: dbdata
        target: /var/lib/postgresql/data
        volume:
          nocopy: true
      - type: bind
        source: ./tmp/farm2.sql
        target: /docker-entrypoint-initdb.d/01_farm2.sql
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: farm2_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: ./Dockerfile
    command: bash -c "rdbg -n --open --host 0.0.0.0 --port 12345 -c -- bundle exec rails s -p 3000 -b '0.0.0.0'"
    tty: true
    stdin_open: true
    environment:
      <<: *ssh_agent_env
      RUBY_DEBUG_LOCAL_FS_MAP: "/farm2:${PWD}"
      RUBY_DEBUG_PORT: 12345
      CHROME_URL: "http://chrome:3333"
      RAILS_ENV: development
      RUBYOPT: "--yjit"
    volumes:
      - *ssh_agent_volume
      - type: bind
        source: .
        target: /farm2
        consistency: delegated
      - type: volume
        source: codex_home
        target: /root/.codex
      - type: volume
        source: vscode_server
        target: /root/.vscode-server
      - type: volume
        source: claude_home
        target: /root/.claude
      - type: volume
        source: gemini_home
        target: /root/.gemini
      - type: volume
        source: ssh_home
        target: /root/.ssh
      - type: tmpfs
        target: /farm2/tmp
      - type: tmpfs
        target: /farm2/log
    ports:
      - "3000:3000"
      - "12345:12345"
    depends_on:
      db:
        condition: service_healthy
      sass:
        condition: service_started
      worker:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      <<: *ssh_agent_env
      RAILS_ENV: development
    command: bundle exec rails jobs:work
    volumes:
      - *ssh_agent_volume
      - type: bind
        source: .
        target: /farm2
    depends_on:
      db:
        condition: service_healthy

  sass:
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      <<: *ssh_agent_env
    command: bundle exec rails dartsass:watch
    volumes:
      - *ssh_agent_volume
      - type: bind
        source: .
        target: /farm2

  chrome:
    image: browserless/chrome:latest
    ports:
      - "3333:3333"
    volumes:
      - .:/app:cached
    environment:
      PORT: 3333
      CONNECTION_TIMEOUT: 600000

volumes:
  dbdata:
  codex_home:
  vscode_server:
  claude_home:
  gemini_home:
  ssh_home:
