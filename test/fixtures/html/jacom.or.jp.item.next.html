      <h1>【ＪＡ人事】ＪＡよいち（北海道）新組合長に梁瀬英司氏（4月13日）</h1>
      <div>
        <p class="whitespace-pre-wrap text-[16px] leading-[28px] font-medium">ＪＡよいち（北海道）は4月13日に第58回総会を開き、役員の改選を行った。</p>
        <p class="whitespace-pre-wrap text-[16px] leading-[28px] font-medium">森山龍徳氏に代わって、梁瀬英司組合長が選任された。</p>
